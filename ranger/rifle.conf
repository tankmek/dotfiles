# ranger rifle.conf - File opener configuration
# Determines which program to use when opening files

# Define the "editor" for text files as per $EDITOR or vim
#-------------------------------------------
# Websites
#-------------------------------------------
ext x?html?, has open,       env DISPLAY = :0, flag f = open -- "$@"
ext x?html?, has w3m,        terminal = w3m "$@"

#-------------------------------------------
# Text files
#-------------------------------------------
mime ^text, label editor = ${VISUAL:-$EDITOR} -- "$@"
mime ^text, label pager  = "$PAGER" -- "$@"
!mime ^text, ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php|go|c|cpp|h|hpp|java|md|yml|yaml|toml|conf|cfg|ini|vim|lua = ${VISUAL:-$EDITOR} -- "$@"
ext 1 = man "$1"

#-------------------------------------------
# Misc
#-------------------------------------------
mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php = ${VISUAL:-$EDITOR} -- "$@"

#-------------------------------------------
# Audio/Video (macOS: open)
#-------------------------------------------
mime ^audio|ogg$, has open, flag f = open -- "$@"
mime ^video,      has open, flag f = open -- "$@"

#-------------------------------------------
# Documents
#-------------------------------------------
ext pdf,  has open, flag f = open -- "$@"
ext docx, has open, flag f = open -- "$@"
ext xlsx, has open, flag f = open -- "$@"
ext pptx, has open, flag f = open -- "$@"

#-------------------------------------------
# Images
#-------------------------------------------
mime ^image, has open, flag f = open -- "$@"

#-------------------------------------------
# Archives
#-------------------------------------------
ext tar|gz|bz2|xz|lzma|tgz|tbz2|txz|zip|rar|7z|ace|cab|cpio|deb|rpm, has atool = atool --list -- "$@" | "$PAGER"
ext tar|gz|bz2|xz|lzma|tgz|tbz2|txz|zip|rar|7z|ace|cab|cpio|deb|rpm, has atool = atool --extract -- "$@"

#-------------------------------------------
# Fallback: editor for anything unrecognized
#-------------------------------------------
              !mime ^text, !ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php  = ask
label editor, !mime ^text, !ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php  = ${VISUAL:-$EDITOR} -- "$@"
label pager,  !mime ^text, !ext xml|json|csv|tex|py|pl|rb|rs|js|ts|sh|php  = "$PAGER" -- "$@"
